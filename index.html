<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受講生コーチングダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ===== 設定 ここだけ書き換えてください ===== */
/* STEP3でSpreadsheet IDとAPIキーを貼り付けます */

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:#F8F9FA;color:#1A1A2E;min-height:100vh}
.header{background:#1A1A2E;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header h1{color:#fff;font-size:16px;font-weight:500}
.header .subtitle{color:rgba(255,255,255,0.5);font-size:12px;margin-left:auto}
.config-bar{background:#FFF8E1;border-bottom:1px solid #FFD54F;padding:10px 24px;font-size:12px;color:#E65100;display:flex;align-items:center;gap:8px}
.config-bar a{color:#1565C0}
.main{max-width:900px;margin:0 auto;padding:24px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:20px;border:1px solid #D0D5DD;background:#fff;color:#666;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit}
.tab-btn.active{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
.tab-btn:hover:not(.active){background:#F5F5F5}
.loading{text-align:center;padding:60px;color:#888;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #E0E0E0;border-top:3px solid #1A1A2E;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:#fff;border-radius:12px;border:1px solid #EBEBEB;padding:20px;margin-bottom:16px}
.profile{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.avatar{width:48px;height:48px;border-radius:50%;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#1D4ED8;flex-shrink:0}
.profile-name{font-size:17px;font-weight:600;color:#1A1A2E}
.profile-sub{font-size:12px;color:#888;margin-top:3px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:#F8F9FA;border-radius:10px;padding:14px}
.kpi-label{font-size:11px;color:#888;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:600;color:#1A1A2E}
.kpi-sub{font-size:11px;color:#888;margin-top:4px}
.section-label{font-size:12px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.chart-wrap{position:relative;width:100%;height:160px;margin-bottom:20px}
.divider{height:1px;background:#F0F0F0;margin:16px 0}
.history-item{padding:10px 0;border-bottom:1px solid #F5F5F5}
.history-item:last-child{border-bottom:none}
.history-date{font-size:11px;color:#888;margin-bottom:4px}
.history-text{font-size:13px;color:#333;line-height:1.6}
.task-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#FAFAFA;border-radius:8px;margin-bottom:6px;border:1px solid #EBEBEB}
.task-left{display:flex;align-items:center;gap:10px;font-size:13px;color:#333}
.task-icon{font-size:16px}
.badge{font-size:11px;padding:3px 12px;border-radius:20px;font-weight:600}
.badge-done{background:#D1FAE5;color:#065F46}
.badge-wip{background:#FEF3C7;color:#92400E}
.badge-todo{background:#F3F4F6;color:#4B5563}
.memo-box{background:#FFFBEB;border-radius:8px;padding:14px;font-size:13px;color:#555;line-height:1.7;border:1px solid #FDE68A}
.ai-card{background:#fff;border-radius:12px;border:1px solid #EBEBEB;padding:20px;margin-top:16px}
.ai-title{font-size:13px;font-weight:600;color:#888;margin-bottom:14px}
.ai-btn{width:100%;padding:12px;border-radius:8px;border:1px solid #D0D5DD;background:#F8F9FA;color:#1A1A2E;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s}
.ai-btn:hover{background:#EBEBEB}
.ai-loading{display:none;align-items:center;gap:8px;font-size:13px;color:#888;margin-top:12px}
.ai-loading.show{display:flex}
.dot{width:6px;height:6px;border-radius:50%;background:#888;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.ai-result{display:none;margin-top:14px;font-size:13px;line-height:1.8;color:#333;background:#F8F9FA;border-radius:8px;padding:14px}
.ai-result.show{display:block}
.followup{display:none;gap:8px;margin-top:12px}
.followup.show{display:flex}
.followup input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid #D0D5DD;font-size:13px;font-family:inherit;outline:none}
.followup input:focus{border-color:#1A1A2E}
.followup button{padding:9px 18px;border-radius:8px;border:1px solid #D0D5DD;background:#1A1A2E;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.reload-btn{background:none;border:none;color:#1565C0;font-size:12px;cursor:pointer;text-decoration:underline;margin-left:8px}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <h1>📋 受講生コーチングダッシュボード</h1>
  <span class="subtitle" id="last-updated"></span>
</div>

<div class="config-bar" id="config-bar" style="display:none">
  ⚠️ <strong>設定が必要です</strong> — <code>SPREADSHEET_ID</code> と <code>API_KEY</code> をファイルに設定してください。
  <a href="#" onclick="alert('setup_guide.md を参照してください')">設定手順を見る</a>
</div>

<div class="main">
  <div id="tabs-area" class="tabs"></div>
  <div id="content">
    <div class="loading"><div class="spinner"></div>データを読み込み中...</div>
  </div>
</div>

<script>
// ============================================================
//  ★ ここを書き換えてください（STEP 3）
// ============================================================
const SPREADSHEET_ID = "1VTo-TN1H3yXCQh9dyOOnM80PX-8q4ege6-pLhL7NsnI";
const API_KEY        = "AIzaSyAlzB9Duw6IP8TVCDlmyxkj8ZJ_fEfihlU";
// ============================================================

const SHEETS_BASE = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values`;

let allData = { masters:[], sales:[], history:[], tasks:[] };
let clients = [];
let currentIdx = 0;
let chartInst = null;

// ---- 起動 ----
window.addEventListener('DOMContentLoaded', () => {
  if(false){
    document.getElementById('config-bar').style.display = 'flex';
    document.getElementById('content').innerHTML = `
      <div class="card empty">
        <div style="font-size:32px;margin-bottom:12px">⚙️</div>
        <div style="font-weight:600;margin-bottom:8px">Google Sheetsとの接続設定が必要です</div>
        <div style="color:#aaa;font-size:13px">setup_guide.md の手順にしたがって<br>SPREADSHEET_ID と API_KEY を設定してください</div>
      </div>`;
    return;
  }
  loadAll();
});

// ---- データ取得 ----
async function fetchSheet(range){
  const url = `${SHEETS_BASE}/${encodeURIComponent(range)}?key=${API_KEY}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Sheets API error: ${res.status}`);
  const data = await res.json();
  return (data.values || []).slice(3); // 1:タイトル 2:注意書き 3:ヘッダー → 4行目からデータ
}

async function loadAll(){
  try{
    const [m, s, h, t] = await Promise.all([
      fetchSheet("受講生マスタ!A:K"),
      fetchSheet("月次売上!A:H"),
      fetchSheet("コーチング履歴!A:G"),
      fetchSheet("タスク!A:G"),
    ]);
    allData = { masters:m, sales:s, history:h, tasks:t };
    buildClients();
    renderTabs();
    renderClient(clients[0]);
    document.getElementById('last-updated').textContent =
      `最終更新: ${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e){
    document.getElementById('content').innerHTML = `
      <div class="card empty">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div style="font-weight:600;margin-bottom:8px">データ取得エラー</div>
        <div style="color:#aaa;font-size:13px">${e.message}</div>
        <div style="margin-top:12px">
          <button class="reload-btn" onclick="loadAll()">再読み込み</button>
        </div>
        <div style="margin-top:16px;font-size:12px;color:#bbb">
          よくある原因：<br>
          ・APIキーかSpreadsheet IDが間違っている<br>
          ・Google CloudでSheets APIが有効化されていない<br>
          ・Sheetsの共有設定が「リンクを知っている人が閲覧可」になっていない
        </div>
      </div>`;
  }
}

// ---- データ構築 ----
function buildClients(){
  clients = allData.masters
    .filter(r => r[0])
    .map(r => {
      const id = r[0];
      const salesRows = allData.sales.filter(s => s[1] === id);
      const histRows  = allData.history.filter(h => h[1] === id).slice(0,5);
      const taskRows  = allData.tasks.filter(t => t[1] === id);

      // 最新月の売上
      const sorted = [...salesRows].sort((a,b)=> (b[0]||'').localeCompare(a[0]||''));
      const latest  = sorted[0] || [];
      const prev    = sorted[1] || [];
      const latestSales = parseInt((latest[4]||'0').toString().replace(/,/g,'')) || 0;
      const prevSales   = parseInt((prev[4]||'0').toString().replace(/,/g,'')) || 0;
      const latestCost  = parseInt((latest[5]||'0').toString().replace(/,/g,'')) || 0;
      const margin = latestSales > 0 ? Math.round((latestSales - latestCost) / latestSales * 100) : 0;
      const diff = latestSales - prevSales;

      // 月別売上グラフ用（最新6ヶ月）
      const months6 = [...salesRows].sort((a,b)=>(a[0]||'').localeCompare(b[0]||'')).slice(-6);
      const chartLabels = months6.map(r => (r[0]||'').replace(/^\d{4}\//,'')+'月');
      const chartData   = months6.map(r => Math.round((parseInt((r[4]||'0').toString().replace(/,/g,''))||0)/10000));

      const totalSales = salesRows.reduce((s,r)=>{
        return s + (parseInt((r[4]||'0').toString().replace(/,/g,''))||0);
      }, 0);

      return {
        id, name: r[1]||'', initials: (r[1]||'').substring(0,2),
        course: [r[5], r[6]?r[6].replace(/\//g,'/')+' 入会':''].filter(Boolean).join(' · '),
        status: r[9]||'',
        kpi:{
          sales:  latestSales>0 ? Math.round(latestSales/10000)+'万円' : '—',
          margin: latestSales>0 ? margin+'%' : '—',
          totalSales: Math.round(totalSales/10000)+'万円',
          diff:   diff>0 ? `先月比 +${Math.round(diff/10000)}万円` : diff<0 ? `先月比 ${Math.round(diff/10000)}万円` : '—'
        },
        chartLabels, chartData,
        history: histRows.map(h=>({date:h[0]||'', text:h[4]||''})),
        tasks: taskRows.map(t=>({text:t[3]||'', status:t[6]||'未着手', priority:t[4]||''})),
        memo: r[10]||'',
        aiContext: `${r[1]}さん、${r[5]||''}。最新月売上${latestSales>0?Math.round(latestSales/10000)+'万円':'不明'}、粗利率${margin}%、累計売上${Math.round(totalSales/10000)}万円。`,
      };
    });
}

// ---- タブ描画 ----
function renderTabs(){
  const area = document.getElementById('tabs-area');
  area.innerHTML = clients.map((c,i)=>
    `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(${i})">${c.name}</button>`
  ).join('') + `<button class="tab-btn" onclick="loadAll()" style="margin-left:auto;color:#888">↺ 更新</button>`;
}

function switchTab(idx){
  currentIdx = idx;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  renderClient(clients[idx]);
}

// ---- クライアント描画 ----
function renderClient(c){
  if(!c){ document.getElementById('content').innerHTML='<div class="empty">受講生データがありません</div>'; return; }

  const badgeClass = s => s==='完了'?'badge-done':s==='進行中'?'badge-wip':'badge-todo';
  const taskIcon   = s => s==='完了'?'✅':s==='進行中'?'🔄':'⭕';

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="profile">
        <div class="avatar">${c.initials}</div>
        <div>
          <div class="profile-name">${c.name}</div>
          <div class="profile-sub">${c.course}</div>
        </div>
        <span style="margin-left:auto;font-size:11px;background:#F0FDF4;color:#065F46;padding:4px 12px;border-radius:20px;font-weight:600">${c.status}</span>
      </div>

      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">今月売上</div><div class="kpi-val">${c.kpi.sales}</div><div class="kpi-sub">${c.kpi.diff}</div></div>
        <div class="kpi"><div class="kpi-label">粗利率</div><div class="kpi-val">${c.kpi.margin}</div></div>
        <div class="kpi"><div class="kpi-label">累計売上</div><div class="kpi-val">${c.kpi.totalSales}</div></div>
        <div class="kpi"><div class="kpi-label">ステータス</div><div class="kpi-val" style="font-size:15px">${c.status}</div></div>
      </div>

      ${c.chartData.length>0 ? `
      <div class="section-label">売上推移（万円）</div>
      <div class="chart-wrap"><canvas id="salesChart" role="img" aria-label="${c.name}の売上推移"></canvas></div>
      ` : ''}

      <div class="divider"></div>

      <div class="section-label">コーチング履歴</div>
      ${c.history.length>0 ? c.history.map(h=>`
        <div class="history-item">
          <div class="history-date">${h.date}</div>
          <div class="history-text">${h.text}</div>
        </div>`).join('') : '<div class="empty" style="padding:20px">履歴なし</div>'}

      <div class="divider"></div>

      <div class="section-label">タスク</div>
      ${c.tasks.length>0 ? c.tasks.map(t=>`
        <div class="task-item">
          <div class="task-left"><span class="task-icon">${taskIcon(t.status)}</span>${t.text}</div>
          <span class="badge ${badgeClass(t.status)}">${t.status}</span>
        </div>`).join('') : '<div class="empty" style="padding:20px">タスクなし</div>'}

      ${c.memo ? `
      <div class="divider"></div>
      <div class="section-label">特記事項</div>
      <div class="memo-box">${c.memo}</div>
      ` : ''}
    </div>

    <div class="ai-card">
      <div class="ai-title">✨ AI コーチングサマリー</div>
      <button class="ai-btn" id="ai-btn" onclick="generateSummary()">
        ✦ AI サマリーを生成する →
      </button>
      <div class="ai-loading" id="ai-loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span>Claude が分析中...</span>
      </div>
      <div class="ai-result" id="ai-result"></div>
      <div class="followup" id="followup">
        <input type="text" id="followup-input" placeholder="フォローアップ質問を入力..." />
        <button onclick="askFollowup()">送信</button>
      </div>
    </div>
  `;

  if(c.chartData.length > 0) drawChart(c);
}

function drawChart(c){
  if(chartInst){ chartInst.destroy(); chartInst=null; }
  const ctx = document.getElementById('salesChart');
  if(!ctx) return;
  chartInst = new Chart(ctx,{
    type:'bar',
    data:{
      labels:c.chartLabels,
      datasets:[{
        label:'売上（万円）',
        data:c.chartData,
        backgroundColor: c.chartData.map((_,i)=>i===c.chartData.length-1?'#534AB7':'#AFA9EC'),
        borderRadius:4, borderSkipped:false
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:v=>`${v.raw}万円`}}},
      scales:{
        x:{grid:{display:false}, ticks:{color:'#aaa',font:{size:11}}, border:{display:false}},
        y:{display:false, min:0}
      }
    }
  });
}

// ---- AI サマリー ----
async function generateSummary(){
  const c = clients[currentIdx];
  document.getElementById('ai-btn').style.display='none';
  document.getElementById('ai-loading').classList.add('show');

  const histText = c.history.map(h=>`${h.date}: ${h.text}`).join(' / ');
  const taskText = c.tasks.filter(t=>t.status!=='完了').map(t=>t.text).join(', ') || 'なし';

  const prompt = `あなたは経験豊富なビジネスコーチです。以下の受講生データをもとに、コーチング視点での簡潔なサマリーを日本語で生成してください。

受講生データ: ${c.aiContext}
コーチング履歴: ${histText||'なし'}
未完了タスク: ${taskText}
特記事項: ${c.memo||'なし'}

以下の形式で出力してください（プレーンテキスト）:
【現状評価】1〜2文
【強み】箇条書き2点
【次のアクション】具体的なアクション2点
【次回セッションで確認すること】1点`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text || 'サマリーを生成できませんでした。';
    document.getElementById('ai-loading').classList.remove('show');
    document.getElementById('ai-result').innerHTML = text.replace(/\n/g,'<br>');
    document.getElementById('ai-result').classList.add('show');
    document.getElementById('followup').classList.add('show');
  } catch(e){
    document.getElementById('ai-loading').classList.remove('show');
    document.getElementById('ai-result').innerHTML = 'エラーが発生しました。もう一度お試しください。';
    document.getElementById('ai-result').classList.add('show');
    document.getElementById('ai-btn').style.display='block';
  }
}

function askFollowup(){
  const input = document.getElementById('followup-input');
  const text = input.value.trim();
  if(!text) return;
  alert(`質問「${text}」を送信しました（Claude連携版では実際にAPIに送信されます）`);
  input.value='';
}
</script>
</body>
</html>
