<script>
const SPREADSHEET_ID = "1VTo-TN1H3yXCQh9dyOOnM80PX-8q4ege6-pLhL7NsnI";
const API_KEY        = "AIzaSyAlzB9Duw6IP8TVCDlmyxkj8ZJ_fEfihlU";
const NOTION_LINKS = {
  "S001":"https://app.notion.com/p/38ee7faedfc081469408f82d930aa6c2",
  "S002":"https://app.notion.com/p/38ee7faedfc081808561fd686c1fc084",
  "S003":"https://app.notion.com/p/38ee7faedfc081c79dffe70d11854388",

  "top": "https://app.notion.com/p/38ee7faedfc081bc82e4c35f2e1fcfdf"
};
const SHEETS_BASE = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values`;
let allData={masters:[],sales:[],history:[],tasks:[],cartes:[]};
let clients=[];
let currentIdx=0;
let chartInst=null;

window.addEventListener('DOMContentLoaded',loadAll);

async function fetchSheet(range){
  const res=await fetch(`${SHEETS_BASE}/${encodeURIComponent(range)}?key=${API_KEY}`);
  if(!res.ok) throw new Error(`Sheets API error: ${res.status}`);
  const d=await res.json();
  return (d.values||[]).slice(3);
}

async function loadAll(){
  try{
    const [m,s,h,t,c]=await Promise.all([
      fetchSheet("受講生マスタ!A:K"),
      fetchSheet("月次売上!A:H"),
      fetchSheet("コーチング履歴!A:G"),
      fetchSheet("タスク!A:G"),
      fetchSheet("カルテ詳細!A:Q"),
    ]);
    allData={masters:m,sales:s,history:h,tasks:t,cartes:c};
    buildClients();
    renderSummary();
    renderTabs();
  }catch(e){
    document.getElementById('summary-content').innerHTML=`<div class="section-card empty"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-weight:600;margin-bottom:8px">データ取得エラー</div><div style="color:#aaa;font-size:13px">${e.message}</div></div>`;
  }
}

function buildClients(){
  clients=allData.masters.filter(r=>r[0]).map(r=>{
    const id=r[0];
    const salesRows=allData.sales.filter(s=>s[1]===id);
    const histRows=allData.history.filter(h=>h[1]===id).slice(0,5);
    const taskRows=allData.tasks.filter(t=>t[1]===id);
    const carteRow=allData.cartes.find(c=>c[0]===id)||[];
    const sorted=[...salesRows].sort((a,b)=>(b[0]||'').localeCompare(a[0]||''));
    const latest=sorted[0]||[];
    const prev=sorted[1]||[];
    const latestSales=parseInt((latest[4]||'0').replace(/,/g,''))||0;
    const prevSales=parseInt((prev[4]||'0').replace(/,/g,''))||0;
    const latestCost=parseInt((latest[5]||'0').replace(/,/g,''))||0;
    const margin=latestSales>0?Math.round((latestSales-latestCost)/latestSales*100):0;
    const diff=latestSales-prevSales;
    const months6=[...salesRows].sort((a,b)=>(a[0]||'').localeCompare(b[0]||'')).slice(-6);
    const totalSales=salesRows.reduce((s,r)=>s+(parseInt((r[4]||'0').replace(/,/g,''))||0),0);
    const doneTasks=taskRows.filter(t=>t[6]==='完了').length;
    const wipTasks=taskRows.filter(t=>t[6]==='進行中').length;
    const todoTasks=taskRows.filter(t=>t[6]==='未着手').length;
    return {
      id,name:r[1]||'',initials:(r[1]||'').substring(0,2),
      course:r[5]||'',status:r[9]||'',memo:r[10]||'',
      kpi:{
        sales:latestSales>0?Math.round(latestSales/10000)+'万円':'—',
        margin:latestSales>0?margin+'%':'—',
        totalSales:Math.round(totalSales/10000)+'万円',
        diff:diff>0?`+${Math.round(diff/10000)}万`:diff<0?`${Math.round(diff/10000)}万`:'—'
      },
      chartLabels:months6.map(r=>(r[0]||'').replace(/^\d{4}\//,'')+'月'),
      chartData:months6.map(r=>Math.round((parseInt((r[4]||'0').replace(/,/g,''))||0)/10000)),
      history:histRows.map(h=>({date:h[0]||'',text:h[4]||''})),
      tasks:taskRows.map(t=>({text:t[3]||'',status:t[6]||'未着手'})),
      doneTasks,wipTasks,todoTasks,latestSales,totalSales,
      carte:{
        motivation:carteRow[2]||'',
        goal:carteRow[3]||'',
        vision:carteRow[4]||'',
        wantMost:carteRow[5]||'',
        strengths:carteRow[6]||'',
        cautions:carteRow[7]||'',
        actionStyle:carteRow[8]||'',
        timetable:carteRow[9]||'',
        reviewGoal:carteRow[10]||'',
        reviewObs:carteRow[11]||'',
        reviewAnal:carteRow[12]||'',
        reviewJudge:carteRow[13]||'',
        reviewGood:carteRow[14]||'',
        coachMemo:carteRow[15]||'',
      },
      aiContext:`${r[1]}さん、${r[5]||''}。最新月売上${latestSales>0?Math.round(latestSales/10000)+'万円':'不明'}、粗利率${margin}%。`,
    };
  });
}

// ===== 全体サマリー =====
function renderSummary(){
  const totalSales=clients.reduce((s,c)=>s+c.latestSales,0);
  const totalDone=clients.reduce((s,c)=>s+c.doneTasks,0);
  const totalWip=clients.reduce((s,c)=>s+c.wipTasks,0);
  const totalTodo=clients.reduce((s,c)=>s+c.todoTasks,0);
  const taskRows=[
    {label:'GS1コード登録',vals:['✅','✅','🔲','✅']},
    {label:'商標登録',vals:['✅','✅','🔄','✅']},
    {label:'広告外注スタート',vals:['✅','🔲','🔲','✅']},
    {label:'Amazonページ作成',vals:['🔲','🔲','🔲','✅']},
    {label:'Keepaリサーチ',vals:['🔄','🔄','🔄','🔲']},
  ];
  document.getElementById('summary-content').innerHTML=`
    <div class="summary-grid">
      <div class="summary-kpi"><div class="label">先月合計売上</div><div class="val">${Math.round(totalSales/10000)}万円</div><div class="sub">4名合計</div></div>
      <div class="summary-kpi"><div class="label">受講生数</div><div class="val">${clients.length}名</div><div class="sub">1期生</div></div>
      <div class="summary-kpi"><div class="label">完了タスク</div><div class="val">${totalDone}</div><div class="sub">全${totalDone+totalWip+totalTodo}件中</div></div>
      <div class="summary-kpi"><div class="label">進行中タスク</div><div class="val">${totalWip}</div><div class="sub">未着手${totalTodo}件</div></div>
    </div>
    <div class="section-card">
      <div class="section-head">👥 受講生カード</div>
      <div class="student-grid">
        ${clients.map((c,i)=>`
          <div class="student-card" onclick="goToDetail(${i})">
            <div class="sc-top">
              <div class="sc-avatar">${c.initials}</div>
              <div><div class="sc-name">${c.name}</div><div class="sc-course">${c.course}</div></div>
              <span style="margin-left:auto;font-size:10px;background:#F0FDF4;color:#065F46;padding:3px 8px;border-radius:10px">${c.status}</span>
            </div>
            <div class="sc-kpis">
              <div class="sc-kpi"><div class="sc-kpi-label">先月売上</div><div class="sc-kpi-val">${c.kpi.sales}</div></div>
              <div class="sc-kpi"><div class="sc-kpi-label">粗利率</div><div class="sc-kpi-val">${c.kpi.margin}</div></div>
              <div class="sc-kpi"><div class="sc-kpi-label">累計</div><div class="sc-kpi-val">${c.kpi.totalSales}</div></div>
            </div>
            <div class="sc-tags">
              ${c.doneTasks>0?`<span class="sc-tag tag-done">✅完了${c.doneTasks}</span>`:''}
              ${c.wipTasks>0?`<span class="sc-tag tag-wip">🔄進行中${c.wipTasks}</span>`:''}
              ${c.todoTasks>0?`<span class="sc-tag tag-todo">⭕未着手${c.todoTasks}</span>`:''}
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="section-card">
      <div class="section-head">✅ 全体タスク進捗</div>
      <table class="progress-table">
        <thead><tr><th>タスク</th>${clients.map(c=>`<th>${c.name}</th>`).join('')}</tr></thead>
        <tbody>${taskRows.map(row=>`<tr><td style="font-size:12px;color:#555">${row.label}</td>${row.vals.map(v=>`<td style="text-align:center;font-size:16px">${v}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="section-card">
      <div class="section-head">📒 Notionカルテへのリンク</div>
      <div style="margin-bottom:10px">
        <a href="${NOTION_LINKS.top}" target="_blank" class="notion-link" style="background:#F0F4FF;border-color:#C7D2FE">
          <span>🏫</span><span style="font-weight:600">1期生カルテ一覧（目次）</span><span class="notion-link-arrow">↗</span>
        </a>
      </div>
      <div class="notion-links">
        ${clients.map(c=>`<a href="${NOTION_LINKS[c.id]||'#'}" target="_blank" class="notion-link"><span>📋</span><span>${c.name}のカルテ</span><span class="notion-link-arrow">↗</span></a>`).join('')}
      </div>
    </div>
    <div class="section-card">
      <div class="section-head">📅 次回イベント</div>
      <div style="font-size:13px;color:#333">📌 <strong>6月30日（火）</strong> Keepaリサーチセミナー（ひで担当）</div>
    </div>`;
}

function goToDetail(idx){
  currentIdx=idx;
  showView('detail');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  renderClient(clients[idx]);
}

// ===== タブ =====
function renderTabs(){
  document.getElementById('tabs-area').innerHTML=
    clients.map((c,i)=>`<button class="tab-btn${i===0?' active':''}" onclick="switchTab(${i})">${c.name}</button>`).join('')+
    `<button class="tab-btn" onclick="loadAll()" style="margin-left:auto;color:#888">↺ 更新</button>`;
  renderClient(clients[0]);
}

function switchTab(idx){
  currentIdx=idx;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  renderClient(clients[idx]);
}

// ===== 個別 =====
function renderClient(c){
  if(!c){document.getElementById('detail-content').innerHTML='<div class="empty">データがありません</div>';return;}
  const bc=s=>s==='完了'?'badge-done':s==='進行中'?'badge-wip':'badge-todo';
  const ti=s=>s==='完了'?'✅':s==='進行中'?'🔄':'⭕';
  const ct=c.carte;

  document.getElementById('detail-content').innerHTML=`
    <div class="card">
      <div class="card-inner">
        <div class="profile">
          <div class="avatar">${c.initials}</div>
          <div>
            <div class="profile-name">${c.name}</div>
            <div class="profile-sub">${c.course}</div>
          </div>
          <span style="margin-left:auto;font-size:11px;background:#F0FDF4;color:#065F46;padding:4px 12px;border-radius:20px;font-weight:600">${c.status}</span>
        </div>
        <div class="kpi-grid">
          <div class="kpi"><div class="kpi-label">今月売上</div><div class="kpi-val">${c.kpi.sales}</div><div class="kpi-sub">先月比 ${c.kpi.diff}</div></div>
          <div class="kpi"><div class="kpi-label">粗利率</div><div class="kpi-val">${c.kpi.margin}</div></div>
          <div class="kpi"><div class="kpi-label">累計売上</div><div class="kpi-val">${c.kpi.totalSales}</div></div>
          <div class="kpi"><div class="kpi-label">ステータス</div><div class="kpi-val" style="font-size:15px">${c.status}</div></div>
        </div>
      </div>

      <!-- カルテ内タブ -->
      <div style="border-top:1px solid #EBEBEB">
        <div class="carte-tabs">
          <button class="carte-tab active" onclick="switchCarteTab('sales',this)">📈 売上・実績</button>
          <button class="carte-tab" onclick="switchCarteTab('carte',this)">📋 カルテ詳細</button>
          <button class="carte-tab" onclick="switchCarteTab('coaching',this)">🗓 コーチング</button>
          <button class="carte-tab" onclick="switchCarteTab('task',this)">✅ タスク</button>
        </div>
        <div class="card-inner">

          <!-- 売上・実績 -->
          <div class="carte-panel show" id="panel-sales">
            ${c.chartData.length>0?`<div class="section-label">売上推移（万円）</div><div class="chart-wrap"><canvas id="salesChart"></canvas></div>`:''}
          </div>

          <!-- カルテ詳細 -->
          <div class="carte-panel" id="panel-carte">
            ${ct.goal?`<div class="carte-block"><span class="carte-block-title">🎯 半年後の目標</span><div class="carte-block-content" style="font-size:15px;font-weight:600;color:#534AB7">${ct.goal}</div></div>`:''}
            <div class="carte-grid">
              ${ct.strengths?`<div class="carte-highlight"><div class="carte-highlight-label">💪 強み</div><div class="carte-highlight-val">${ct.strengths}</div></div>`:''}
              ${ct.cautions?`<div class="carte-highlight" style="border-left-color:#F39C12"><div class="carte-highlight-label" style="color:#F39C12">⚠️ 注意点</div><div class="carte-highlight-val">${ct.cautions}</div></div>`:''}
            </div>
            ${ct.motivation?`<div class="carte-block" style="margin-top:16px"><span class="carte-block-title">💬 参加動機</span><div class="carte-block-content">${ct.motivation}</div></div>`:''}
            ${ct.vision?`<div class="carte-block"><span class="carte-block-title">🌟 実現したい未来</span><div class="carte-block-content">${ct.vision}</div></div>`:''}
            ${ct.wantMost?`<div class="carte-block"><span class="carte-block-title">🏆 一番手に入れたいもの</span><div class="carte-block-content" style="font-style:italic;color:#534AB7">"${ct.wantMost}"</div></div>`:''}
            ${ct.timetable?`<div class="carte-block"><span class="carte-block-title">⏰ タイムテーブル</span><div class="timetable">${ct.timetable}</div></div>`:''}
            ${ct.actionStyle?`<div class="carte-block"><span class="carte-block-title">🏃 行動スタイル</span><div class="carte-block-content">${ct.actionStyle}</div></div>`:''}
            ${ct.coachMemo?`<div class="carte-block"><span class="carte-block-title">📝 コーチメモ</span><div class="coach-memo">${ct.coachMemo}</div></div>`:''}
          </div>

          <!-- コーチング履歴 -->
          <div class="carte-panel" id="panel-coaching">
            <div class="section-label">月次振り返り</div>
            <div class="monthly-review" style="margin-bottom:20px">
              ${ct.reviewGoal?`<div class="review-item"><div class="review-label">🎯 目標</div><div class="review-val">${ct.reviewGoal}</div></div>`:''}
              ${ct.reviewObs?`<div class="review-item"><div class="review-label">👁 観察</div><div class="review-val">${ct.reviewObs}</div></div>`:''}
              ${ct.reviewAnal?`<div class="review-item"><div class="review-label">🔍 分析</div><div class="review-val">${ct.reviewAnal}</div></div>`:''}
              ${ct.reviewJudge?`<div class="review-item"><div class="review-label">✍️ 判断・修正</div><div class="review-val">${ct.reviewJudge}</div></div>`:''}
              ${ct.reviewGood?`<div class="review-item" style="grid-column:1/-1;background:#E8F8F0"><div class="review-label" style="color:#27AE60">✨ 良い変化</div><div class="review-val">${ct.reviewGood}</div></div>`:''}
            </div>
            <div class="section-label">面談履歴</div>
            ${c.history.length>0?c.history.map(h=>`<div class="history-item"><div class="history-date">${h.date}</div><div class="history-text">${h.text}</div></div>`).join(''):'<div class="empty" style="padding:20px">履歴なし</div>'}
          </div>

          <!-- タスク -->
          <div class="carte-panel" id="panel-task">
            ${c.tasks.length>0?c.tasks.map(t=>`<div class="task-item"><div class="task-left"><span>${ti(t.status)}</span>${t.text}</div><span class="badge ${bc(t.status)}">${t.status}</span></div>`).join(''):'<div class="empty" style="padding:20px">タスクなし</div>'}
            ${c.memo?`<div class="divider"></div><div class="section-label">特記事項</div><div class="memo-box">${c.memo}</div>`:''}
          </div>

        </div>
      </div>
    </div>

    <div class="ai-card">
      <div class="ai-title">✨ AI コーチングサマリー</div>
      <button class="ai-btn" id="ai-btn" onclick="generateSummary()">✦ AI サマリーを生成する →</button>
      <div class="ai-loading" id="ai-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Claude が分析中...</span></div>
      <div class="ai-result" id="ai-result"></div>
    </div>`;

  if(c.chartData.length>0) drawChart(c);
}

function switchCarteTab(panel, btn){
  document.querySelectorAll('.carte-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.carte-panel').forEach(p=>p.classList.remove('show'));
  btn.classList.add('active');
  document.getElementById('panel-'+panel).classList.add('show');
  if(panel==='sales') drawChart(clients[currentIdx]);
}

function drawChart(c){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const ctx=document.getElementById('salesChart');
  if(!ctx) return;
  chartInst=new Chart(ctx,{type:'bar',data:{labels:c.chartLabels,datasets:[{label:'売上（万円）',data:c.chartData,backgroundColor:c.chartData.map((_,i)=>i===c.chartData.length-1?'#534AB7':'#AFA9EC'),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`${v.raw}万円`}}},scales:{x:{grid:{display:false},ticks:{color:'#aaa',font:{size:11}},border:{display:false}},y:{display:false,min:0}}}});
}

function showView(v){
  document.getElementById('view-summary').style.display=v==='summary'?'block':'none';
  document.getElementById('view-detail').style.display=v==='detail'?'block':'none';
  document.getElementById('btn-summary').classList.toggle('active',v==='summary');
  document.getElementById('btn-detail').classList.toggle('active',v==='detail');
}

async function generateSummary(){
  const c=clients[currentIdx];
  document.getElementById('ai-btn').style.display='none';
  document.getElementById('ai-loading').classList.add('show');
  const ct=c.carte;
  const prompt=`あなたは経験豊富なビジネスコーチです。以下の受講生データをもとに、コーチング視点での簡潔なサマリーを日本語で生成してください。\n受講生: ${c.name}（${c.course}）\n目標: ${ct.goal}\n強み: ${ct.strengths}\n注意点: ${ct.cautions}\n参加動機: ${ct.motivation}\n最新売上: ${c.kpi.sales}、粗利率: ${c.kpi.margin}\n未完了タスク: ${c.tasks.filter(t=>t.status!=='完了').map(t=>t.text).join(', ')||'なし'}\nコーチメモ: ${ct.coachMemo}\n\n以下の形式で出力してください（プレーンテキスト）:\n【現状評価】1〜2文\n【強み】箇条書き2点\n【次のアクション】具体的なアクション2点\n【次回セッションで確認すること】1点`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'サマリーを生成できませんでした。';
    document.getElementById('ai-loading').classList.remove('show');
    document.getElementById('ai-result').innerHTML=text.replace(/\n/g,'<br>');
    document.getElementById('ai-result').classList.add('show');
  }catch(e){
    document.getElementById('ai-loading').classList.remove('show');
    document.getElementById('ai-result').innerHTML='エラーが発生しました。もう一度お試しください。';
    document.getElementById('ai-result').classList.add('show');
    document.getElementById('ai-btn').style.display='block';
  }
}
</script>
</body>
</html>
完了
